<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="fur" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f4ee"/>
      <stop offset="100%" stop-color="#c9c3b8"/>
    </linearGradient>
    <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eaeaea"/>
    </linearGradient>
  </defs>

  <!-- HEAD -->
  <g>
    <circle cx="400" cy="300" r="170" fill="url(#fur)" stroke="#888" stroke-width="4"/>

    <!-- ears -->
    <path d="M290 150 C300 80 350 60 370 160 Z" fill="url(#fur)" stroke="#888" stroke-width="3"/>
    <path d="M510 150 C500 80 450 60 430 160 Z" fill="url(#fur)" stroke="#888" stroke-width="3"/>

    <!-- inner ears -->
    <path d="M310 150 C320 100 350 90 360 150 Z" fill="#f2dede"/>
    <path d="M490 150 C480 100 450 90 440 150 Z" fill="#f2dede"/>

    <!-- eyes -->
    <ellipse cx="340" cy="290" rx="32" ry="38" fill="#9ed6e8"/>
    <ellipse cx="460" cy="290" rx="32" ry="38" fill="#9ed6e8"/>
    <ellipse cx="340" cy="300" rx="16" ry="20" fill="#111"/>
    <ellipse cx="460" cy="300" rx="16" ry="20" fill="#111"/>
    <circle cx="350" cy="280" r="6" fill="#fff"/>
    <circle cx="470" cy="280" r="6" fill="#fff"/>

    <!-- nose -->
    <polygon points="400,340 380,360 420,360" fill="#444"/>

    <!-- mouth -->
    <path d="M400 360 C380 390 350 390 330 370" stroke="#444" stroke-width="3" fill="none"/>
    <path d="M400 360 C420 390 450 390 470 370" stroke="#444" stroke-width="3" fill="none"/>

    <!-- whiskers -->
    <line x1="300" y1="350" x2="360" y2="360" stroke="#888" stroke-width="2"/>
    <line x1="300" y1="370" x2="360" y2="370" stroke="#888" stroke-width="2"/>
    <line x1="500" y1="350" x2="440" y2="360" stroke="#888" stroke-width="2"/>
    <line x1="500" y1="370" x2="440" y2="370" stroke="#888" stroke-width="2"/>
  </g>

  <!-- BODY / BLOUSE -->
  <g>
    <path d="M260 450 C260 700 540 700 540 450 
             C500 480 450 500 400 500 
             C350 500 300 480 260 450Z"
          fill="url(#coat)" stroke="#ccc" stroke-width="4"/>

    <!-- collar -->
    <path d="M330 450 L400 540 L370 450 Z" fill="#ffffff"/>
    <path d="M470 450 L400 540 L430 450 Z" fill="#ffffff"/>

    <!-- paws -->
    <ellipse cx="330" cy="520" rx="45" ry="28" fill="url(#fur)"/>
    <ellipse cx="470" cy="520" rx="45" ry="28" fill="url(#fur)"/>
  </g>

  <!-- BADGE -->
  <g>
    <circle cx="500" cy="580" r="35" fill="#2c3e50"/>
    <text x="500" y="590" text-anchor="middle" font-size="24" font-family="Arial" fill="#fff" font-weight="bold">Dr</text>
  </g>

</svg>
