<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="coat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9793a"/>
      <stop offset="100%" stop-color="#7a3b12"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e6e6e6"/>
    </linearGradient>
  </defs>

  <!-- HEAD -->
  <g>
    <ellipse cx="400" cy="300" rx="170" ry="200" fill="url(#coat)" stroke="#3b1f0f" stroke-width="6"/>

    <!-- ears -->
    <path d="M300 140 C300 60 340 40 370 140 Z" fill="url(#coat)" stroke="#3b1f0f" stroke-width="5"/>
    <path d="M500 140 C500 60 460 40 430 140 Z" fill="url(#coat)" stroke="#3b1f0f" stroke-width="5"/>

    <!-- eyes -->
    <ellipse cx="340" cy="290" rx="22" ry="28" fill="#111"/>
    <ellipse cx="460" cy="290" rx="22" ry="28" fill="#111"/>
    <circle cx="348" cy="280" r="6" fill="#fff"/>
    <circle cx="468" cy="280" r="6" fill="#fff"/>

    <!-- blaze -->
    <path d="M390 120 C370 260 370 360 400 470 C430 360 430 260 410 120 Z" fill="#ffffff"/>

    <!-- nose -->
    <ellipse cx="400" cy="440" rx="55" ry="35" fill="#f2c6a0"/>
  </g>

  <!-- BODY / BLOUSE -->
  <g>
    <path d="M260 450 C260 700 540 700 540 450 
             C520 470 480 500 400 500 
             C320 500 280 470 260 450Z"
          fill="url(#shadow)" stroke="#cfcfcf" stroke-width="5"/>

    <!-- collar -->
    <path d="M320 450 L400 540 L380 450 Z" fill="#ffffff"/>
    <path d="M480 450 L400 540 L420 450 Z" fill="#ffffff"/>

    <!-- pocket -->
    <rect x="460" y="540" width="70" height="80" rx="10" fill="#ffffff" stroke="#ccc" stroke-width="3"/>
  </g>

  <!-- STETHOSCOPE -->
  <g stroke="#333" stroke-width="6" fill="none">
    <path d="M350 500 C320 550 360 600 400 580"/>
    <path d="M450 500 C480 550 440 600 400 580"/>
    <circle cx="400" cy="600" r="12" fill="#333"/>
  </g>

  <!-- BADGE -->
  <g>
    <circle cx="500" cy="580" r="35" fill="#2c3e50"/>
    <text x="500" y="590" text-anchor="middle" font-size="26" font-family="Arial" fill="#ffffff" font-weight="bold">Dr</text>
  </g>

</svg>
