<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroScribe - Accueil</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a2e;
      --ink-light: #3d3d5c;
      --paper: #faf8f4;
      --accent: #2d6a4f;
      --accent-light: #52b788;
      --accent-pale: #d8f3dc;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: linear-gradient(135deg, #e8e4dc 0%, #f0ebe8 100%);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--ink);
      color: white;
      padding: 24px 40px;
      text-align: center;
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
    }

    header h1 {
      font-family: 'Libre Baskerville', serif;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    header h1 span {
      color: var(--accent-light);
    }

    header p {
      font-size: 14px;
      color: #aaa;
      font-style: italic;
    }

    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 40px 40px 40px;
    }

    .home-container {
      max-width: 500px;
      text-align: center;
    }

    .home-title {
      font-family: 'Libre Baskerville', serif;
      font-size: 36px;
      color: var(--ink);
      margin-bottom: 16px;
      font-weight: 700;
    }

    .home-subtitle {
      font-size: 16px;
      color: var(--ink-light);
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .home-buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .mascotte-container {
      margin-bottom: 24px;
      display: flex;
      justify-content: center;
      animation: float 3s ease-in-out infinite;
    }

    .mascotte-selector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      margin-bottom: 40px;
    }

    .mascotte-arrow {
      background: var(--accent);
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      font-weight: bold;
    }

    .mascotte-arrow:hover {
      background: #1f5333;
      transform: scale(1.1);
    }

    .mascotte-selector .mascotte-container {
      flex: 1;
      max-width: 300px;
      display: flex;
      justify-content: center;
    }

    .mascotte-container svg {
      width: 200px;
      height: 280px;
      filter: drop-shadow(0 10px 25px rgba(45, 106, 79, 0.2));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }

    .home-btn {
      padding: 16px 32px;
      font-size: 16px;
      border: 2px solid;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      font-family: inherit;
      text-decoration: none;
      display: inline-block;
    }

    .home-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .home-btn.primary:hover {
      background: #2d6a4f;
      box-shadow: 0 8px 20px rgba(45, 106, 79, 0.3);
      transform: translateY(-2px);
    }

    .home-btn.secondary {
      background: white;
      border-color: var(--accent);
      color: var(--accent);
    }

    .home-btn.secondary:hover {
      background: var(--accent-pale);
      box-shadow: 0 8px 20px rgba(45, 106, 79, 0.15);
      transform: translateY(-2px);
    }

    @media (max-width: 600px) {
      header {
        padding: 16px 20px;
      }

      header h1 {
        font-size: 24px;
      }

      main {
        padding: 30px 20px;
      }

      .home-title {
        font-size: 28px;
      }
    }
  </style>
  <script src="api.js"></script>
</head>
<body>
  <header>
    <h1>Neur🐾<span>Scribe</span></h1>
    <p>Le coup de patte pour les bilans neuropsychologiques</p>
  </header>

  <main>
    <div class="home-container">
      <div class="mascotte-selector">
        <button class="mascotte-arrow" onclick="previousMascotte()">◀</button>
        <div class="mascotte-container" id="mascotte-display">
          <!-- Mascotte SVG sera chargée ici par JavaScript -->
        </div>
        <button class="mascotte-arrow" onclick="nextMascotte()">▶</button>
      </div>
      <div class="home-title">Bienvenue</div>
      <div class="home-subtitle">Créez et gérez vos bilans neuropsychologiques avec l'aide de Claude</div>
      <div class="home-buttons">
        <button class="home-btn primary" onclick="startNewBilan()">
          📝 Commencer un nouveau bilan
        </button>
        <button class="home-btn secondary" onclick="window.location.href='bilans.html'">
          📋 Voir mes bilans
        </button>
      </div>
    </div>
  </main>

  <script>
    // ─────────────────────────────────────────────
    // MASCOTTE SELECTOR - DECLARATIONS
    // ─────────────────────────────────────────────
    const mascottes = [
      {
        name: "Chien (Poppy)",
        file: "PoppyDoctor.svg"
      },
      {
        name: "Cheval (Doctor)",
        file: "horse_mascot_doctor_v2.svg"
      },
      {
        name: "Chat (Doctor)",
        file: "cat_mascot_doctor_v2.svg"
      }
    ];

    let currentMascotteIndex = parseInt(localStorage.getItem('selected_mascotte') || '0');

    function loadMascotte() {
      const mascotte = mascottes[currentMascotteIndex];
      const display = document.getElementById('mascotte-display');
      
      if (!display) {
        console.error('❌ Element mascotte-display not found');
        return;
      }
      
      if (!mascotte) {
        console.error('❌ Mascotte not found at index:', currentMascotteIndex);
        return;
      }
      
      console.log('📦 Chargement mascotte:', mascotte.file);
      
      fetch(mascotte.file)
        .then(response => {
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          return response.text();
        })
        .then(svg => {
          display.innerHTML = svg;
          console.log('✓ Mascotte chargée:', mascotte.file);
        })
        .catch(error => {
          console.error('❌ Erreur chargement mascotte:', error);
          display.innerHTML = '<div style="color: #ccc; text-align: center; padding: 40px;">Image non disponible</div>';
        });
    }

    function nextMascotte() {
      currentMascotteIndex = (currentMascotteIndex + 1) % mascottes.length;
      localStorage.setItem('selected_mascotte', currentMascotteIndex);
      console.log('➡️ Next mascotte:', mascottes[currentMascotteIndex].name);
      loadMascotte();
    }

    function previousMascotte() {
      currentMascotteIndex = (currentMascotteIndex - 1 + mascottes.length) % mascottes.length;
      localStorage.setItem('selected_mascotte', currentMascotteIndex);
      console.log('⬅️ Previous mascotte:', mascottes[currentMascotteIndex].name);
      loadMascotte();
    }

    // ─────────────────────────────────────────────
    // BILAN FUNCTIONS
    // ─────────────────────────────────────────────
    async function startNewBilan() {
      try {
        const bilanData = {
          id: Date.now().toString(),
          name: 'Nouveau bilan',
          date: new Date().toLocaleDateString('fr-FR'),
          time: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }),
          data: {
            'patient-name': '',
            'age': 'adulte',
            'genre': 'homme',
          }
        };

        const result = await createBilan(bilanData);
        if (result && result.id) {
          localStorage.setItem('current_session_id', result.id);
          console.log('📝 Nouveau bilan créé:', result.id);
          window.location.href = 'editor.html';
        } else {
          alert('❌ Erreur: Impossible de créer le bilan. Vérifiez votre connexion.');
        }
      } catch (error) {
        console.error('❌ Erreur startNewBilan:', error);
        alert('❌ Erreur serveur. Veuillez réessayer.');
      }
    }

    // ─────────────────────────────────────────────
    // INITIALIZATION ON DOM READY
    // ─────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async function() {
      console.log('🎨 DOM ready - initializing...');
      
      // Load mascotte
      loadMascotte();
      
      // Check for existing session
      const currentSessionId = localStorage.getItem('current_session_id');
      if (currentSessionId) {
        try {
          const bilan = await getBilan(currentSessionId);
          if (bilan) {
            console.log('📂 Session courante trouvée:', currentSessionId);
            console.log('🔄 Redirection vers l\'éditeur...');
            window.location.href = 'editor.html';
          } else {
            localStorage.removeItem('current_session_id');
          }
        } catch (error) {
          console.error('❌ Erreur vérification session:', error);
          localStorage.removeItem('current_session_id');
        }
      }
    });
  </script>

</body>
</html>
