<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeuroScribe - Accueil</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a2e;
      --ink-light: #3d3d5c;
      --paper: #faf8f4;
      --accent: #2d6a4f;
      --accent-light: #52b788;
      --accent-pale: #d8f3dc;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Source Sans 3', sans-serif;
      background: linear-gradient(135deg, #e8e4dc 0%, #f0ebe8 100%);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--ink);
      color: white;
      padding: 24px 40px;
      text-align: center;
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
    }

    header h1 {
      font-family: 'Libre Baskerville', serif;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    header h1 span {
      color: var(--accent-light);
    }

    header p {
      font-size: 14px;
      color: #aaa;
      font-style: italic;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 40px;
    }

    .home-container {
      max-width: 500px;
      text-align: center;
    }

    .home-title {
      font-family: 'Libre Baskerville', serif;
      font-size: 36px;
      color: var(--ink);
      margin-bottom: 16px;
      font-weight: 700;
    }

    .home-subtitle {
      font-size: 16px;
      color: var(--ink-light);
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .home-buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .mascotte-container {
      margin-bottom: 40px;
      display: flex;
      justify-content: center;
      animation: float 3s ease-in-out infinite;
    }

    .mascotte-container svg {
      width: 200px;
      height: 280px;
      filter: drop-shadow(0 10px 25px rgba(45, 106, 79, 0.2));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
    }

    .home-btn {
      padding: 16px 32px;
      font-size: 16px;
      border: 2px solid;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      font-family: inherit;
      text-decoration: none;
      display: inline-block;
    }

    .home-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .home-btn.primary:hover {
      background: #2d6a4f;
      box-shadow: 0 8px 20px rgba(45, 106, 79, 0.3);
      transform: translateY(-2px);
    }

    .home-btn.secondary {
      background: white;
      border-color: var(--accent);
      color: var(--accent);
    }

    .home-btn.secondary:hover {
      background: var(--accent-pale);
      box-shadow: 0 8px 20px rgba(45, 106, 79, 0.15);
      transform: translateY(-2px);
    }

    @media (max-width: 600px) {
      header {
        padding: 16px 20px;
      }

      header h1 {
        font-size: 24px;
      }

      main {
        padding: 30px 20px;
      }

      .home-title {
        font-size: 28px;
      }
    }
  </style>
  <script src="api.js"></script>
</head>
<body>
  <header>
    <h1>Neuro<span>Scribe</span></h1>
    <p>Outil de rédaction neuropsychologique propulsé par Claude</p>
  </header>

  <main>
    <div class="home-container">
      <div class="mascotte-container">
        <svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
          <!-- Blouse blanche -->
          <ellipse cx="100" cy="150" rx="65" ry="85" fill="white" stroke="#ddd" stroke-width="2"/>
          <rect x="50" y="120" width="100" height="120" fill="white" stroke="#ddd" stroke-width="2"/>
          
          <!-- Manches -->
          <ellipse cx="35" cy="140" rx="20" ry="45" fill="white" stroke="#ddd" stroke-width="2"/>
          <ellipse cx="165" cy="140" rx="20" ry="45" fill="white" stroke="#ddd" stroke-width="2"/>
          
          <!-- Boutons de la blouse -->
          <circle cx="100" cy="130" r="3" fill="#999"/>
          <circle cx="100" cy="160" r="3" fill="#999"/>
          <circle cx="100" cy="190" r="3" fill="#999"/>
          
          <!-- Tête du bulldog (noir) -->
          <ellipse cx="100" cy="80" rx="55" ry="60" fill="#1a1a1a"/>
          
          <!-- Oreilles -->
          <ellipse cx="60" cy="35" rx="18" ry="25" fill="#1a1a1a"/>
          <ellipse cx="140" cy="35" rx="18" ry="25" fill="#1a1a1a"/>
          <ellipse cx="60" cy="40" rx="10" ry="15" fill="#3a3a3a"/>
          <ellipse cx="140" cy="40" rx="10" ry="15" fill="#3a3a3a"/>
          
          <!-- Museau (plus clair) -->
          <ellipse cx="100" cy="95" rx="40" ry="35" fill="#2a2a2a"/>
          
          <!-- Zone blanche autour des yeux -->
          <ellipse cx="75" cy="65" rx="12" ry="15" fill="white"/>
          <ellipse cx="125" cy="65" rx="12" ry="15" fill="white"/>
          
          <!-- Lunettes -->
          <!-- Monture gauche -->
          <circle cx="70" cy="65" r="15" fill="none" stroke="#333" stroke-width="2.5"/>
          <circle cx="70" cy="65" r="11" fill="none" stroke="#FFD700" stroke-width="1.5"/>
          <!-- Monture droite -->
          <circle cx="130" cy="65" r="15" fill="none" stroke="#333" stroke-width="2.5"/>
          <circle cx="130" cy="65" r="11" fill="none" stroke="#FFD700" stroke-width="1.5"/>
          <!-- Pont des lunettes -->
          <line x1="85" y1="65" x2="115" y2="65" stroke="#333" stroke-width="2.5"/>
          
          <!-- Yeux -->
          <circle cx="70" cy="65" r="4" fill="white"/>
          <circle cx="70" cy="65" r="2.5" fill="black"/>
          <circle cx="130" cy="65" r="4" fill="white"/>
          <circle cx="130" cy="65" r="2.5" fill="black"/>
          <!-- Petits reflets dans les yeux -->
          <circle cx="71" cy="63" r="1" fill="white"/>
          <circle cx="131" cy="63" r="1" fill="white"/>
          
          <!-- Nez -->
          <ellipse cx="100" cy="85" rx="6" ry="5" fill="#1a1a1a"/>
          <ellipse cx="100" cy="85" rx="4" ry="3" fill="black"/>
          
          <!-- Bouche -->
          <path d="M 100 90 Q 85 98 75 95" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
          <path d="M 100 90 Q 115 98 125 95" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
          
          <!-- Petites rides de bulldog -->
          <path d="M 85 78 Q 80 80 78 85" stroke="#0a0a0a" stroke-width="1.5" fill="none" opacity="0.5"/>
          <path d="M 115 78 Q 120 80 122 85" stroke="#0a0a0a" stroke-width="1.5" fill="none" opacity="0.5"/>
          
          <!-- Expression joviale - sourcils -->
          <path d="M 62 55 Q 70 50 78 55" stroke="#666" stroke-width="1.5" fill="none" stroke-linecap="round"/>
          <path d="M 122 55 Q 130 50 138 55" stroke="#666" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="home-title">Bienvenue</div>
      <div class="home-subtitle">Créez et gérez vos bilans neuropsychologiques avec l'aide de Claude</div>
      <div class="home-buttons">
        <button class="home-btn primary" onclick="startNewBilan()">
          📝 Commencer un nouveau bilan
        </button>
        <button class="home-btn secondary" onclick="window.location.href='archives.html'">
          📋 Voir mes archives
        </button>
      </div>
    </div>
  </main>

  <script>
    // Vérifier s'il y a une session en cours
    window.addEventListener('DOMContentLoaded', async function() {
      const currentSessionId = localStorage.getItem('current_session_id');
      if (currentSessionId) {
        // Vérifier que la session existe toujours en BD
        const bilan = await getBilan(currentSessionId);
        if (bilan) {
          console.log('📂 Session courante trouvée:', currentSessionId);
          console.log('🔄 Redirection vers l\'éditeur...');
          window.location.href = 'editor.html';
        } else {
          // Session n'existe plus, nettoyer localStorage
          localStorage.removeItem('current_session_id');
        }
      }
    });
    
    async function startNewBilan() {
      try {
        // Créer un nouveau bilan en MongoDB
        const bilanData = {
          id: Date.now().toString(),
          name: 'Nouveau bilan',
          date: new Date().toLocaleDateString('fr-FR'),
          time: new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }),
          data: {
            'patient-name': '',
            'age': 'adulte',
            'genre': 'homme',
          }
        };

        const result = await createBilan(bilanData);
        if (result && result.id) {
          // Sauvegarder l'ID dans localStorage pour tracking local
          localStorage.setItem('current_session_id', result.id);
          console.log('📝 Nouveau bilan créé:', result.id);
          // Rediriger vers l'éditeur
          window.location.href = 'editor.html';
        } else {
          alert('❌ Erreur: Impossible de créer le bilan. Vérifiez votre connexion.');
        }
      } catch (error) {
        console.error('❌ Erreur startNewBilan:', error);
        alert('❌ Erreur serveur. Veuillez réessayer.');
      }
    }
  </script>
</body>
</html>
