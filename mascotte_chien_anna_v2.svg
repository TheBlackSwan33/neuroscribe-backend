<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="coat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d3138"/>
      <stop offset="100%" stop-color="#111317"/>
    </linearGradient>
    <linearGradient id="chest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9edf2"/>
    </linearGradient>
    <style>
      .line{stroke:#16181c;stroke-width:10;stroke-linecap:round;stroke-linejoin:round}
      .soft{stroke:#2c3138;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <g filter="url(#shadow)">
    <!-- body -->
    <path d="M270 520 C270 440 330 400 400 400 C470 400 530 440 530 520 C530 600 480 660 400 660 C320 660 270 600 270 520Z"
          fill="url(#coat)" class="line"/>

    <!-- chest -->
    <path d="M360 480 C380 460 420 460 440 480 C455 500 440 560 400 620 C360 560 345 500 360 480Z"
          fill="url(#chest)" class="soft"/>

    <!-- FRONT PAWS -->
    <g>
      <!-- left paw -->
      <path d="M300 600 C280 630 300 680 350 690 C380 695 400 680 400 650 C400 630 380 610 350 600Z"
            fill="url(#coat)" class="line"/>
      <!-- right paw -->
      <path d="M500 600 C520 630 500 680 450 690 C420 695 400 680 400 650 C400 630 420 610 450 600Z"
            fill="url(#coat)" class="line"/>

      <!-- little claws detail -->
      <circle cx="340" cy="690" r="5" fill="#2c3138"/>
      <circle cx="360" cy="695" r="5" fill="#2c3138"/>
      <circle cx="460" cy="695" r="5" fill="#2c3138"/>
      <circle cx="440" cy="690" r="5" fill="#2c3138"/>
    </g>

    <!-- head -->
    <circle cx="400" cy="300" r="170" fill="url(#coat)" class="line"/>

    <!-- eyes -->
    <circle cx="330" cy="290" r="35" fill="#fff"/>
    <circle cx="470" cy="290" r="35" fill="#fff"/>
    <circle cx="335" cy="300" r="18" fill="#111"/>
    <circle cx="465" cy="300" r="18" fill="#111"/>

    <!-- nose -->
    <ellipse cx="400" cy="350" rx="40" ry="30" fill="#111"/>

    <!-- mouth -->
    <path d="M400 380 C370 420 330 420 300 400" fill="none" class="soft"/>
    <path d="M400 380 C430 420 470 420 500 400" fill="none" class="soft"/>

  </g>
</svg>
