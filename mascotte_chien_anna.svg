<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" role="img" aria-labelledby="title desc">
  <title id="title">Mascotte style bouledogue français noir</title>
  <desc id="desc">Mascotte vectorielle inspirée d’un chien noir avec grandes oreilles et plastron blanc.</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="coat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d3138"/>
      <stop offset="100%" stop-color="#111317"/>
    </linearGradient>
    <linearGradient id="innerEar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4b4f58"/>
      <stop offset="100%" stop-color="#2a2d33"/>
    </linearGradient>
    <linearGradient id="chest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e9edf2"/>
    </linearGradient>
    <style>
      .line{stroke:#16181c;stroke-width:10;stroke-linecap:round;stroke-linejoin:round}
      .soft{stroke:#2c3138;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <!-- subtle badge background -->
  <g opacity="0.9">
    <circle cx="400" cy="400" r="310" fill="#f5f7fb"/>
    <circle cx="400" cy="400" r="290" fill="#ffffff" stroke="#e7ebf2" stroke-width="8"/>
  </g>

  <g filter="url(#shadow)">
    <!-- body -->
    <g transform="translate(0 18)">
      <path d="M270 545
               C270 465 326 420 400 420
               C474 420 530 465 530 545
               C530 620 486 680 400 680
               C314 680 270 620 270 545Z"
            fill="url(#coat)" class="line"/>
      <path d="M357 498
               C379 480 421 480 443 498
               C456 509 456 536 441 553
               C425 571 413 596 400 632
               C387 596 375 571 359 553
               C344 536 344 509 357 498Z"
            fill="url(#chest)" class="soft"/>
    </g>

    <!-- ears -->
    <path d="M255 250
             C215 140 230 78 295 62
             C348 49 381 110 352 206
             C339 249 301 280 255 250Z"
          fill="url(#coat)" class="line"/>
    <path d="M545 250
             C585 140 570 78 505 62
             C452 49 419 110 448 206
             C461 249 499 280 545 250Z"
          fill="url(#coat)" class="line"/>
    <path d="M282 224
             C258 157 267 115 303 104
             C331 95 347 130 333 187
             C326 213 307 231 282 224Z"
          fill="url(#innerEar)" class="soft"/>
    <path d="M518 224
             C542 157 533 115 497 104
             C469 95 453 130 467 187
             C474 213 493 231 518 224Z"
          fill="url(#innerEar)" class="soft"/>

    <!-- head -->
    <path d="M246 242
             C273 194 324 166 400 166
             C476 166 527 194 554 242
             C583 293 584 387 539 444
             C499 495 448 524 400 524
             C352 524 301 495 261 444
             C216 387 217 293 246 242Z"
          fill="url(#coat)" class="line"/>

    <!-- cheeks / muzzle -->
    <path d="M286 385
             C295 336 340 308 400 308
             C460 308 505 336 514 385
             C522 432 483 482 400 482
             C317 482 278 432 286 385Z"
          fill="#22262c" class="soft"/>

    <!-- eyes -->
    <g>
      <ellipse cx="328" cy="334" rx="39" ry="48" fill="#ffffff" class="soft"/>
      <ellipse cx="472" cy="334" rx="39" ry="48" fill="#ffffff" class="soft"/>
      <ellipse cx="336" cy="344" rx="21" ry="27" fill="#16181c"/>
      <ellipse cx="464" cy="344" rx="21" ry="27" fill="#16181c"/>
      <circle cx="346" cy="333" r="7" fill="#ffffff"/>
      <circle cx="474" cy="333" r="7" fill="#ffffff"/>
      <circle cx="338" cy="350" r="3.5" fill="#5e6b7a"/>
      <circle cx="466" cy="350" r="3.5" fill="#5e6b7a"/>
    </g>

    <!-- brows -->
    <path d="M287 292 C309 274 344 269 369 281" fill="none" class="soft"/>
    <path d="M431 281 C456 269 491 274 513 292" fill="none" class="soft"/>

    <!-- nose -->
    <path d="M357 388
             C363 358 383 340 400 340
             C417 340 437 358 443 388
             C446 404 433 418 416 420
             C408 421 392 421 384 420
             C367 418 354 404 357 388Z"
          fill="#121417" class="line"/>
    <path d="M386 382 C388 372 394 366 400 366 C406 366 412 372 414 382" fill="none" stroke="#40464f" stroke-width="5" stroke-linecap="round"/>

    <!-- snout split and mouth -->
    <path d="M400 420 L400 455" fill="none" class="soft"/>
    <path d="M400 455
             C382 474 354 476 332 463" fill="none" class="soft"/>
    <path d="M400 455
             C418 474 446 476 468 463" fill="none" class="soft"/>

    <!-- whisker dots -->
    <circle cx="344" cy="430" r="4" fill="#434850"/>
    <circle cx="325" cy="442" r="4" fill="#434850"/>
    <circle cx="456" cy="430" r="4" fill="#434850"/>
    <circle cx="475" cy="442" r="4" fill="#434850"/>

    <!-- little chest connection / neck -->
    <path d="M338 495
             C355 516 378 528 400 528
             C422 528 445 516 462 495"
          fill="none" class="soft"/>

    <!-- collar -->
    <g transform="translate(0 8)">
      <path d="M300 508
               C327 488 361 478 400 478
               C439 478 473 488 500 508
               L484 540
               C459 524 431 516 400 516
               C369 516 341 524 316 540Z"
            fill="#1d2025" class="line"/>
      <circle cx="515" cy="522" r="15" fill="#d7dde6" stroke="#6f7884" stroke-width="6"/>
      <path d="M464 518 L482 560" fill="none" stroke="#cdd4de" stroke-width="8" stroke-linecap="round"/>
      <rect x="471" y="555" width="18" height="40" rx="6" fill="#d7dde6" stroke="#6f7884" stroke-width="6" transform="rotate(18 480 575)"/>
    </g>
  </g>
</svg>
