<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">Mascotte chat noir et blanc</title>
  <desc id="desc">Mascotte vectorielle d’un chat noir et blanc avec yeux verts et nez rose, dans un style doux et expressif.</desc>

  <defs>
    <linearGradient id="furBlack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b2d31"/>
      <stop offset="100%" stop-color="#0d0f12"/>
    </linearGradient>
    <linearGradient id="furWhite" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ececec"/>
    </linearGradient>
    <linearGradient id="eyes" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfd9a8"/>
      <stop offset="100%" stop-color="#8c9a63"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .line{stroke:#2b2d31;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .soft{stroke:#909090;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .whisker{stroke:#d8d8d8;stroke-width:3.5;stroke-linecap:round}
    </style>
  </defs>

  <g filter="url(#shadow)">
    <!-- head -->
    <path d="M250 300
             C250 196 317 126 400 126
             C483 126 550 196 550 300
             C550 401 484 470 400 470
             C316 470 250 401 250 300Z"
          fill="url(#furWhite)" class="line"/>

    <!-- ears -->
    <path d="M292 182 C286 112 321 76 367 122 C358 160 345 184 317 213 Z"
          fill="url(#furBlack)" class="line"/>
    <path d="M508 182 C514 112 479 76 433 122 C442 160 455 184 483 213 Z"
          fill="url(#furBlack)" class="line"/>

    <!-- black mask -->
    <path d="M254 293
             C258 206 318 146 400 146
             C482 146 542 206 546 293
             C520 250 484 234 451 234
             C435 234 419 238 408 247
             C402 252 398 252 392 247
             C381 238 365 234 349 234
             C316 234 280 250 254 293Z"
          fill="url(#furBlack)"/>

    <!-- cheeks side black -->
    <path d="M268 322 C279 282 316 258 350 264 C334 304 329 342 333 376 C303 378 277 360 268 322Z"
          fill="url(#furBlack)"/>
    <path d="M532 322 C521 282 484 258 450 264 C466 304 471 342 467 376 C497 378 523 360 532 322Z"
          fill="url(#furBlack)"/>

    <!-- center blaze -->
    <path d="M388 146
             C372 190 372 229 384 267
             C392 291 394 319 392 377
             L408 377
             C406 319 408 291 416 267
             C428 229 428 190 412 146Z"
          fill="url(#furWhite)"/>

    <!-- eyes -->
    <ellipse cx="338" cy="293" rx="34" ry="39" fill="url(#eyes)" class="line"/>
    <ellipse cx="462" cy="293" rx="34" ry="39" fill="url(#eyes)" class="line"/>
    <ellipse cx="343" cy="299" rx="11" ry="19" fill="#14161a"/>
    <ellipse cx="457" cy="299" rx="11" ry="19" fill="#14161a"/>
    <circle cx="352" cy="282" r="6" fill="#ffffff"/>
    <circle cx="466" cy="282" r="6" fill="#ffffff"/>

    <!-- muzzle -->
    <path d="M320 336
             C330 308 358 294 400 294
             C442 294 470 308 480 336
             C489 362 475 402 446 417
             C430 425 416 429 400 429
             C384 429 370 425 354 417
             C325 402 311 362 320 336Z"
          fill="url(#furWhite)"/>

    <!-- nose -->
    <path d="M400 326 L381 343 Q400 356 419 343 Z"
          fill="#f0a8ad" class="soft"/>

    <!-- mouth -->
    <path d="M400 345 L400 366" fill="none" class="soft"/>
    <path d="M400 366 C382 386 355 388 334 376" fill="none" class="soft"/>
    <path d="M400 366 C418 386 445 388 466 376" fill="none" class="soft"/>

    <!-- small chin mark -->
    <path d="M385 386 C393 395 407 395 415 386 C408 402 392 402 385 386Z" fill="#14161a"/>

    <!-- whiskers -->
    <path d="M314 351 C274 342 250 340 220 344" class="whisker" fill="none"/>
    <path d="M320 369 C276 372 245 381 214 392" class="whisker" fill="none"/>
    <path d="M323 334 C285 318 257 306 229 294" class="whisker" fill="none"/>
    <path d="M486 351 C526 342 550 340 580 344" class="whisker" fill="none"/>
    <path d="M480 369 C524 372 555 381 586 392" class="whisker" fill="none"/>
    <path d="M477 334 C515 318 543 306 571 294" class="whisker" fill="none"/>

    <!-- forehead hairs -->
    <path d="M384 157 C381 129 386 104 392 89" class="whisker" fill="none"/>
    <path d="M401 157 C402 126 408 100 417 84" class="whisker" fill="none"/>
    <path d="M418 162 C424 138 436 117 451 103" class="whisker" fill="none"/>

    <!-- body -->
    <path d="M274 470
             C274 414 326 394 400 394
             C474 394 526 414 526 470
             C526 586 475 678 400 678
             C325 678 274 586 274 470Z"
          fill="url(#furBlack)" class="line"/>

    <!-- chest -->
    <path d="M336 440
             C355 423 380 416 400 416
             C420 416 445 423 464 440
             C483 456 490 493 476 530
             C460 573 438 621 400 666
             C362 621 340 573 324 530
             C310 493 317 456 336 440Z"
          fill="url(#furWhite)" class="line"/>

    <!-- front paws -->
    <ellipse cx="352" cy="596" rx="42" ry="30" fill="url(#furWhite)" class="soft"/>
    <ellipse cx="448" cy="596" rx="42" ry="30" fill="url(#furWhite)" class="soft"/>
  </g>
</svg>
