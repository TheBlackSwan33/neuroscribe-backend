<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="fur" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dcdcdc"/>
    </linearGradient>
    <linearGradient id="coat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ececec"/>
    </linearGradient>
  </defs>

  <!-- HEAD -->
  <g>
    <circle cx="400" cy="300" r="170" fill="url(#fur)" stroke="#888" stroke-width="4"/>

    <!-- ears -->
    <path d="M300 150 C300 80 350 80 360 170 Z" fill="#333"/>
    <path d="M500 150 C500 80 450 80 440 170 Z" fill="#333"/>

    <!-- eyes -->
    <ellipse cx="340" cy="290" rx="28" ry="32" fill="#111"/>
    <ellipse cx="460" cy="290" rx="28" ry="32" fill="#111"/>
    <circle cx="350" cy="280" r="6" fill="#fff"/>
    <circle cx="470" cy="280" r="6" fill="#fff"/>

    <!-- nose -->
    <ellipse cx="400" cy="350" rx="40" ry="30" fill="#222"/>

    <!-- mouth -->
    <path d="M400 370 C370 410 340 410 320 390" stroke="#444" stroke-width="3" fill="none"/>
    <path d="M400 370 C430 410 460 410 480 390" stroke="#444" stroke-width="3" fill="none"/>
  </g>

  <!-- BODY / BLOUSE -->
  <g>
    <path d="M260 450 C260 700 540 700 540 450 
             C500 480 450 500 400 500 
             C350 500 300 480 260 450Z"
          fill="url(#coat)" stroke="#ccc" stroke-width="4"/>

    <!-- harness hint -->
    <path d="M300 500 C350 480 450 480 500 500" stroke="#333" stroke-width="6" fill="none"/>

    <!-- paws -->
    <ellipse cx="330" cy="520" rx="45" ry="28" fill="url(#fur)"/>
    <ellipse cx="470" cy="520" rx="45" ry="28" fill="url(#fur)"/>
  </g>

  <!-- BADGE -->
  <g>
    <circle cx="500" cy="580" r="35" fill="#2c3e50"/>
    <text x="500" y="590" text-anchor="middle" font-size="24" font-family="Arial" fill="#fff" font-weight="bold">Dr</text>
  </g>

</svg>
